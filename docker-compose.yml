services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slidewreck
    volumes:
      - pgdata:/var/lib/postgresql/data

  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3100:3100"   # Loki
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3000"   # Grafana UI (3200 to avoid conflict with Next.js on 3000)
    environment:
      ENABLE_LOGS_ALL: true
    volumes:
      - ./grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/talkforge.yaml
      - ./grafana/dashboards:/otel-lgtm/talkforge-dashboards
      - lgtmdata:/data

volumes:
  pgdata:
  lgtmdata:
